name: Build Benge Property design

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  headless-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - name: Install Ubuntu x86_64 lock
        run: |
          if [ -f requirements/dev-ubuntu-x86_64-py313.lock ] && head -1 requirements/dev-ubuntu-x86_64-py313.lock | grep -q "^# "; then
            pip install --require-hashes -r requirements/dev-ubuntu-x86_64-py313.lock
          else
            echo "Ubuntu x86_64 Python 3.13 lock is PENDING — install via Section 10 procedure (Prompt 09)"
            exit 1
          fi
      - run: ruff check model.py config.py project_tests
      - run: mypy
      - run: pytest -q
      - uses: actions/upload-artifact@v4
        with:
          name: benge-property-generated
          path: generated/
