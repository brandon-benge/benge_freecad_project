name: Deploy Benge Property CAD viewer

on:
  workflow_run:
    workflows: ["Benge Property CAD CI"]
    types:
      - completed
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PIP_NO_CACHE_DIR: 1

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Verify commit SHA
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.workflow_run.head_sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install from lock
        run: |
          pip install --require-hashes -r requirements/locks/dev-ubuntu-x86_64-py313.lock
          pip check
      - name: Validate
        run: python-cad validate --project-root .
      - name: Clean
        run: python-cad clean --project-root .
      - name: Build
        run: python-cad build --project-root .
      - name: Verify
        run: python-cad verify --project-root .
      - name: Prepare site
        run: python-cad prepare-site --project-root . --destination site --base-path /benge-property-cad/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
