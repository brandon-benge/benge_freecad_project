name: Build and deploy design viewer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install CAD dependencies
        run: pip install -r .tools/requirements/runtime.lock
      - name: Generate design artifacts
        run: python build.py
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - name: Install viewer dependencies
        working-directory: viewer
        run: npm ci
      - name: Prepare generated model assets
        working-directory: viewer
        run: npm run prepare-model
      - name: Test viewer
        working-directory: viewer
        run: npm test
      - name: Verify prepared GLB in Babylon.js
        working-directory: viewer
        run: npm run test:model
      - name: Build viewer
        working-directory: viewer
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: viewer/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
